name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.20.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build

  native:
    name: Native (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - windows-2022
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.20.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm generate
      - run: cmake --preset release
      - run: cmake --build --preset release --parallel 2
      - run: ctest --preset release
      - run: pnpm exec plugin validate --build-vst3-validator
      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-${{ runner.os }}
          path: build/validation/report.json
